name: 逃離博物館 17speed
enabled: true
template: templates/123.png
threshold: 0.9
consecutive_hits: 2
cooldown_seconds: 0.05
trigger: once_per_appearance
program:
- type: if
  condition:
    type: image_any
    threshold: 0.85
    templates:
    - templates/group_1781957391851.png
    - templates/group_1781957406001.png
    - templates/group_1783378106520.png
    - templates/group_1783378118830.png
  then:
  - type: click
    delay: 0.0
    backend: directinput
    target: match
    x: 0
    y: 0
    clicks: 1
    button: left
  - type: if
    condition:
      type: image_any
      threshold: 0.85
      templates:
      - templates/group_1781959568347.png
      - templates/group_1783377871100.png
    then:
    - type: click
      delay: 0.0
      backend: directinput
      target: match
      x: 0
      y: 0
      clicks: 1
      button: left
    - type: move
      delay: 0.0
      backend: directinput
      target: park
      x: 0
      y: 0
      margin: 20
      duration: 0.2
    - type: press
      delay: 3.0
      backend: directinput
      key: escape
      presses: 1
    else:
    - type: press
      delay: 0.0
      backend: directinput
      key: escape
      presses: 2
    - type: press
      delay: 0.0
      backend: directinput
      key: enter
      presses: 2
    - type: restart_flow
      delay: 2.0
  else:
  - type: restart_flow
    delay: 0.0
- type: if
  condition:
    type: image_any
    threshold: 0.7
    templates:
    - templates/group_1783567085443.png
    - templates/group_1783567097090.png
  then:
  - type: press
    delay: 0.0
    backend: directinput
    key: enter
    presses: 2
  - type: press
    delay: 1.0
    backend: directinput
    key: escape
    presses: 2
  - type: restart_flow
    delay: 0.0
  else:
  - type: goto_step
    delay: 0.0
    step: 3
- type: if
  condition:
    type: image_any
    threshold: 0.6
    templates:
    - templates/condition_1781821331.png
    - templates/group_1783379066785.png
    - templates/group_1783379087263.png
  then:
  - type: press
    delay: 1.0
    backend: directinput
    key: ctrl
    presses: 45
  - type: press
    delay: 0.1
    backend: directinput
    key: z
    presses: 2
  - type: play_record
    delay: 1.0
    backend: directinput
    recording_file: recordings/leaving_6.yaml
    repeat_count: 1
    repeat_delay: 0.0
    speed_percent: 100.0
  - type: restart_flow
    delay: 0.0
  else: []

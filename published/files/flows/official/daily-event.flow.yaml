name: Daily event
enabled: true
cooldown_seconds: 0.05
program:
- type: repeat
  times: 2
  steps:
  - type: if
    condition:
      type: image
      operator: appears
      template: templates/condition_1782082362.png
      threshold: 0.9
    then:
    - type: click
      delay: 0.0
      backend: directinput
      target: match
      x: 0
      y: 0
      clicks: 1
      button: left
    - type: move
      delay: 0.0
      backend: directinput
      target: park
      x: 0
      y: 0
      margin: 20
      duration: 0.2
    else: []
  - type: if
    condition:
      type: image
      operator: appears
      template: templates/condition_1781821331.png
      threshold: 0.6
    then:
    - type: press
      delay: 1.0
      backend: directinput
      key: ctrl
      presses: 50
    - type: press
      delay: 0.1
      backend: directinput
      key: z
      presses: 2
    - type: play_record
      delay: 1.0
      backend: directinput
      recording_file: recordings/leaving_6.yaml
      repeat_count: 1
      repeat_delay: 0.5
      speed_percent: 100.0
    else: []
- type: if
